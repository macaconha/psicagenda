<!DOCTYPE html>
{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap');

:root {
   
    --color-primary: #4682B4;      
    --color-secondary: #B2F4C5;     
    --color-background: #F8F8F8;    
    --color-text: #333333;          
    --color-error: #E74C3C;        
    --color-success: #2ECC71;       
}
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Open Sans', sans-serif;
    background-color: var(--color-background);
    color: var(--color-text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}



header {
    width: 100%;
    text-align: center;
    position: absolute;
    top: 0;
    padding: 20px 0;
}

header h1 {
    color: var(--color-primary);
    font-size: 2.5em;
    font-weight: 700;
}



main {
    background: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
    width: 100%;
    max-width: 400px; /* Largura máxima para manter a elegância */
    margin-top: 80px; /* Espaçamento do header */
    text-align: center;
}


.form-group {
    margin-bottom: 20px;
    text-align: left;
}

label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #555;
}

input[type="text"],
input[type="password"] {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 1em;
    transition: border-color 0.3s, box-shadow 0.3s;
}

input:focus {
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px rgba(70, 130, 180, 0.2); /* Sombra suave de foco */
    outline: none;
}


.btn-login {
    width: 100%;
    background-color: var(--color-primary);
    color: white;
    border: none;
    padding: 15px;
    border-radius: 8px;
    font-size: 1.1em;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.3s, transform 0.1s;
    margin-top: 10px;
}

.btn-login:hover {
    background-color: #366795; 
}

.btn-login:active {
    transform: scale(0.99); 
}

main p {
    margin-top: 20px;
}

main a {
    color: var(--color-primary);
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s;
}

main a:hover {
    color: #366795;
    text-decoration: underline;
}


.messages {
    margin-bottom: 20px;
    text-align: center;
}

.message {
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 10px;
    font-size: 0.95em;
    font-weight: 600;
}


.messages p[class*="error"] {
    background-color: rgba(231, 76, 60, 0.15); 
    color: var(--color-error);
    border: 1px solid var(--color-error);
}

.messages p:not([class*="error"]) {
    background-color: rgba(70, 130, 180, 0.15);
    color: var(--color-primary);
    border: 1px solid var(--color-primary);
}
    </style>
</head>
<body>
    <header>
        <h1>Oasis</h1>
    </header>

    <main>
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <p class="message">{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username" placeholder="Usuário" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="Senha" required>
            </div>

            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <p>Não tem conta? <a href="{% url 'register' %}">Criar Conta</a></p>
    </main>
</body>
</html>
